<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.title} + ' - 全文阅读'">全文阅读</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { margin: 0; }
        .reader-sidebar {
            width: 260px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding: 1rem;
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .reader-sidebar.collapsed {
            transform: translateX(-100%);
        }
        .reader-main {
            margin-left: 260px;
            padding: 2rem 3rem;
            max-width: 900px;
            transition: margin-left 0.3s ease;
        }
        .reader-main.expanded {
            margin-left: 0;
        }
        .toggle-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1100;
            transition: left 0.3s ease;
        }
        .toggle-btn.shifted {
            left: 270px;
        }
        .chapter-content {
            white-space: pre-wrap;
            font-size: 1.05rem;
            line-height: 1.8;
        }
        .chapter-divider {
            border: 0;
            border-top: 2px dashed #dee2e6;
            margin: 3rem 0;
        }
        .toc-link {
            display: block;
            padding: 0.3rem 0.5rem;
            color: #333;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .toc-link:hover {
            background: #e9ecef;
            color: #000;
        }
        .tts-toolbar {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        .tts-chapter-btn {
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .tts-chapter-btn:hover, .tts-chapter-btn.active {
            opacity: 1;
        }
        @media (max-width: 768px) {
            .reader-sidebar { transform: translateX(-100%); }
            .reader-sidebar.show-mobile { transform: translateX(0); }
            .reader-main { margin-left: 0; }
            .toggle-btn { left: 10px !important; }
        }
    </style>
</head>
<body x-data="readerApp()" x-init="initTts()">

    <button class="btn btn-sm btn-outline-dark toggle-btn"
            :class="{ 'shifted': sidebarOpen && window.innerWidth > 768 }"
            @click="sidebarOpen = !sidebarOpen">
        <i class="bi bi-list"></i>
    </button>

    <aside class="reader-sidebar"
           :class="{ 'collapsed': !sidebarOpen, 'show-mobile': sidebarOpen }">
        <div class="mb-3 mt-4">
            <a th:href="@{/projects/{id}(id=${project.id})}" class="btn btn-sm btn-outline-secondary w-100">
                <i class="bi bi-arrow-left"></i> 返回项目
            </a>
        </div>
        <h6 class="text-muted mb-2" th:text="${project.title}">书名</h6>
        <hr>
        <nav>
            <a th:each="chapter : ${chapters}"
               th:href="'#chapter-' + ${chapter.chapterNumber}"
               th:text="'第' + ${chapter.chapterNumber} + '章 ' + (${chapter.title} ?: '')"
               class="toc-link"
               @click="if(window.innerWidth <= 768) sidebarOpen = false">
            </a>
        </nav>
    </aside>

    <main class="reader-main" :class="{ 'expanded': !sidebarOpen }">
        <h2 class="mb-4" th:text="${project.title}">书名</h2>

        <!-- TTS Controls -->
        <div class="tts-toolbar mb-4" x-show="tts.configs.length > 0" x-cloak>
            <div class="d-flex flex-wrap align-items-center gap-3">
                <span class="fw-bold small"><i class="bi bi-volume-up"></i> TTS</span>

                <!-- Config selector (when multiple) -->
                <select class="form-select form-select-sm" style="max-width: 160px;"
                        x-show="tts.configs.length > 1"
                        x-model="tts.selectedConfigId" @change="onConfigChange()">
                    <template x-for="cfg in tts.configs" :key="cfg.id">
                        <option :value="cfg.id" x-text="cfg.displayName"></option>
                    </template>
                </select>

                <!-- Voice -->
                <select class="form-select form-select-sm" style="max-width: 140px;"
                        x-model="tts.voice" @change="saveTtsPrefs()">
                    <template x-for="v in getVoiceOptions()" :key="v">
                        <option :value="v" x-text="v"></option>
                    </template>
                </select>

                <!-- Speed -->
                <div class="d-flex align-items-center gap-1">
                    <input type="range" class="form-range" style="width: 80px;"
                           min="0.25" max="4.0" step="0.25"
                           x-model="tts.speed" @change="saveTtsPrefs()">
                    <span class="small text-muted" x-text="tts.speed + 'x'" style="min-width: 35px;"></span>
                </div>

                <!-- Chunk size -->
                <div class="d-flex align-items-center gap-1">
                    <span class="small text-muted">段落:</span>
                    <input type="number" class="form-control form-control-sm" style="width: 55px;"
                           min="1" max="500" x-model.number="tts.minLen" @change="saveTtsPrefs()">
                    <span class="small text-muted">-</span>
                    <input type="number" class="form-control form-control-sm" style="width: 55px;"
                           min="10" max="4000" x-model.number="tts.maxLen" @change="saveTtsPrefs()">
                    <span class="small text-muted">字</span>
                </div>

                <!-- Export button -->
                <a class="btn btn-sm btn-outline-dark ms-auto"
                   th:href="@{/tts-export(projectId=${project.id})}">
                    <i class="bi bi-download"></i> 导出MP3
                </a>
            </div>

            <!-- Resume Banner -->
            <div x-show="playlistResumeOffer" x-cloak class="alert alert-info alert-dismissible mt-2 mb-0 py-2 small">
                <i class="bi bi-arrow-clockwise"></i>
                上次全文收听到第 <strong x-text="playlistResumeChapter"></strong> 章
                <button @click="acceptResume()" class="btn btn-sm btn-primary ms-2">继续</button>
                <button @click="dismissResume()" class="btn btn-sm btn-secondary ms-1">取消</button>
            </div>

            <!-- Full Listen Controls -->
            <div class="mt-2 border-top pt-2">
                <!-- Not active: show start button -->
                <div x-show="!playlist.isActive">
                    <button class="btn btn-sm btn-outline-success" @click="startFullListen()">
                        <i class="bi bi-play-circle"></i> 全文收听
                    </button>
                </div>
                <!-- Active: show controls -->
                <div x-show="playlist.isActive" class="d-flex align-items-center gap-2 flex-wrap">
                    <span class="badge bg-success">
                        <i class="bi bi-music-note-list"></i> 全文收听中
                    </span>
                    <span class="small text-muted" x-text="'第' + (playlist.chapters[playlist.currentIndex] || '') + '章 (' + (playlist.currentIndex + 1) + '/' + playlist.chapters.length + ')'"></span>
                    <div class="btn-group btn-group-sm ms-auto">
                        <button class="btn btn-outline-secondary" @click="playlistPrev()" :disabled="playlist.currentIndex <= 0">
                            <i class="bi bi-skip-backward-fill"></i>
                        </button>
                        <button class="btn btn-outline-primary" @click="playlist.paused ? playlistResume() : playlistPause()">
                            <i :class="playlist.paused ? 'bi bi-play-fill' : 'bi bi-pause-fill'"></i>
                            <span x-text="playlist.paused ? '继续' : '暂停'"></span>
                        </button>
                        <button class="btn btn-outline-secondary" @click="playlistNext()" :disabled="playlist.currentIndex >= playlist.chapters.length - 1">
                            <i class="bi bi-skip-forward-fill"></i>
                        </button>
                        <button class="btn btn-outline-danger" @click="stopFullListen()">
                            <i class="bi bi-stop-fill"></i> 停止
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div th:each="chapter, iter : ${chapters}">
            <hr th:if="${!iter.first}" class="chapter-divider">
            <div class="d-flex align-items-center gap-2 mb-2">
                <h3 th:id="'chapter-' + ${chapter.chapterNumber}" class="mb-0"
                    th:text="'第' + ${chapter.chapterNumber} + '章 ' + (${chapter.title} ?: '')">
                    章节标题
                </h3>
                <!-- Per-chapter TTS button -->
                <span x-show="tts.configs.length > 0" x-cloak
                      th:with="cn=${chapter.chapterNumber}"
                      th:x-data="'{ cn: ' + ${chapter.chapterNumber} + ' }'">
                    <button class="btn btn-sm tts-chapter-btn"
                            :class="tts.playing === cn ? 'btn-danger' : 'btn-outline-secondary'"
                            @click="toggleChapter(cn)"
                            :disabled="tts.loading === cn">
                        <span x-show="tts.loading === cn">
                            <span class="spinner-border spinner-border-sm"></span>
                        </span>
                        <span x-show="tts.loading !== cn">
                            <i :class="tts.playing === cn ? 'bi bi-stop-fill' : 'bi bi-play-fill'"></i>
                        </span>
                    </button>
                </span>
            </div>
            <div class="chapter-content mt-3" th:text="${chapter.content ?: '（暂无内容）'}">
                章节内容
            </div>
        </div>

        <div th:if="${#lists.isEmpty(chapters)}" class="text-muted text-center py-5">
            <i class="bi bi-journal-x" style="font-size: 3rem;"></i>
            <p class="mt-2">暂无章节内容</p>
        </div>
    </main>

    <script src="https://unpkg.com/alpinejs@3.14.3/dist/cdn.min.js" defer></script>
    <script th:inline="javascript">
    function readerApp() {
        const projectId = /*[[${project.id}]]*/ 0;
        return {
            sidebarOpen: window.innerWidth > 768,
            tts: {
                configs: [],
                selectedConfigId: null,
                voice: 'alloy',
                speed: 1.0,
                minLen: 10,
                maxLen: 200,
                playing: null,
                loading: null,
                audio: null,
                abortController: null,
                preGeneratedFiles: {},
                onChapterEndedCallback: null
            },
            playlist: {
                isActive: false,
                chapters: [],
                currentIndex: -1,
                paused: false
            },
            playlistResumeOffer: false,
            playlistResumeChapter: '',
            async initTts() {
                try {
                    const res = await fetch(`/projects/${projectId}/tts/configs`);
                    if (res.ok) {
                        this.tts.configs = await res.json();
                        if (this.tts.configs.length > 0) {
                            const defaultConfig = this.tts.configs.find(c => c.isDefault);
                            this.tts.selectedConfigId = defaultConfig ? defaultConfig.id : this.tts.configs[0].id;
                        }
                    }
                } catch (e) {
                    console.warn('Failed to load TTS configs', e);
                }
                this.loadTtsPrefs();
                // Ensure voice is valid for selected config
                const voices = this.getVoiceOptions();
                if (voices.length > 0 && !voices.includes(this.tts.voice)) {
                    this.tts.voice = voices[0];
                }
                // Load pre-generated files
                try {
                    const filesRes = await fetch(`/api/tts-export/projects/${projectId}/completed-files`);
                    if (filesRes.ok) {
                        this.tts.preGeneratedFiles = await filesRes.json();
                    }
                } catch (e) {}
                // Check for saved playlist state
                this.loadPlaylistState();
            },
            loadTtsPrefs() {
                try {
                    const saved = localStorage.getItem('tts_prefs_' + projectId);
                    if (saved) {
                        const prefs = JSON.parse(saved);
                        if (prefs.voice) this.tts.voice = prefs.voice;
                        if (prefs.speed) this.tts.speed = prefs.speed;
                        if (prefs.minLen) this.tts.minLen = prefs.minLen;
                        if (prefs.maxLen) this.tts.maxLen = prefs.maxLen;
                        if (prefs.configId && this.tts.configs.some(c => c.id == prefs.configId)) {
                            this.tts.selectedConfigId = prefs.configId;
                        }
                    }
                } catch (e) {}
            },
            saveTtsPrefs() {
                try {
                    localStorage.setItem('tts_prefs_' + projectId, JSON.stringify({
                        voice: this.tts.voice,
                        speed: this.tts.speed,
                        minLen: this.tts.minLen,
                        maxLen: this.tts.maxLen,
                        configId: this.tts.selectedConfigId
                    }));
                } catch (e) {}
            },
            toggleChapter(num) {
                if (this.playlist.isActive) {
                    this.stopFullListen();
                }
                if (this.tts.playing === num) {
                    this.stopAudio();
                } else {
                    this.playChapter(num);
                }
            },
            async playChapter(num) {
                this.stopAudio();
                // Check for pre-generated file first
                if (this.tts.preGeneratedFiles && this.tts.preGeneratedFiles[num]) {
                    const abortController = new AbortController();
                    this.tts.abortController = abortController;
                    this.tts.playing = num;
                    const audio = new Audio(this.tts.preGeneratedFiles[num]);
                    this.tts.audio = audio;
                    audio.onended = () => {
                        this.tts.playing = null; this.tts.audio = null;
                        if (this.tts.onChapterEndedCallback) this.tts.onChapterEndedCallback();
                    };
                    audio.onerror = () => {
                        this.tts.playing = null; this.tts.audio = null;
                        if (this.tts.onChapterEndedCallback) this.tts.onChapterEndedCallback();
                    };
                    abortController.signal.addEventListener('abort', () => audio.pause(), { once: true });
                    audio.play().catch(() => { this.tts.playing = null; this.tts.audio = null; });
                    return;
                }
                const abortController = new AbortController();
                this.tts.abortController = abortController;
                this.tts.loading = num;
                try {
                    // 1. Fetch chunk list
                    const chunksRes = await fetch(`/projects/${projectId}/tts/chapter/${num}/chunks?minLen=${this.tts.minLen}&maxLen=${this.tts.maxLen}`, {
                        signal: abortController.signal
                    });
                    if (!chunksRes.ok) throw new Error('Failed to get chunks');
                    const chunks = await chunksRes.json();

                    // 2. Enter playing state
                    this.tts.loading = null;
                    this.tts.playing = num;

                    // 3. Sequential fetch queue + playback with sliding window
                    const PREFETCH_AHEAD = 15;
                    const audioBlobs = new Map(); // index -> Promise<Blob>
                    const fetchQueue = [];        // indices waiting to be fetched
                    let fetching = false;

                    // Sequential fetcher: processes queue one at a time
                    const processFetchQueue = async () => {
                        if (fetching) return;
                        fetching = true;
                        while (fetchQueue.length > 0) {
                            if (abortController.signal.aborted) break;
                            const idx = fetchQueue.shift();
                            if (audioBlobs.has(idx)) continue;
                            let resolve;
                            const promise = new Promise(r => { resolve = r; });
                            audioBlobs.set(idx, promise);
                            try {
                                const res = await fetch(`/projects/${projectId}/tts/chunk`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        configId: Number(this.tts.selectedConfigId),
                                        text: chunks[idx],
                                        voice: this.tts.voice,
                                        format: this.getSelectedFormat(),
                                        speed: Number(this.tts.speed)
                                    }),
                                    signal: abortController.signal
                                });
                                if (!res.ok) throw new Error('TTS chunk failed');
                                resolve(await res.blob());
                            } catch (e) {
                                resolve(null);
                                if (e.name !== 'AbortError') throw e;
                            }
                        }
                        fetching = false;
                    };

                    // Enqueue a chunk index for fetching (if not already fetched/queued)
                    const enqueueFetch = (idx) => {
                        if (idx >= chunks.length || audioBlobs.has(idx) || fetchQueue.includes(idx)) return;
                        fetchQueue.push(idx);
                        processFetchQueue();
                    };

                    // Seed initial fetch queue: first PREFETCH_AHEAD+1 chunks
                    for (let p = 0; p < Math.min(PREFETCH_AHEAD + 1, chunks.length); p++) {
                        enqueueFetch(p);
                    }

                    // 4. Play chunks sequentially
                    for (let i = 0; i < chunks.length; i++) {
                        if (abortController.signal.aborted) break;

                        // Wait for this chunk's audio to be fetched
                        const blob = await audioBlobs.get(i);
                        if (!blob || abortController.signal.aborted) break;
                        audioBlobs.delete(i);

                        const audioUrl = URL.createObjectURL(blob);
                        const audio = new Audio(audioUrl);
                        this.tts.audio = audio;

                        await new Promise((resolve, reject) => {
                            audio.onended = () => { URL.revokeObjectURL(audioUrl); resolve(); };
                            audio.onerror = () => { URL.revokeObjectURL(audioUrl); reject(new Error('Audio playback error')); };
                            const onAbort = () => {
                                audio.pause();
                                URL.revokeObjectURL(audioUrl);
                                resolve();
                            };
                            abortController.signal.addEventListener('abort', onAbort, { once: true });
                            audio.play().catch(reject);
                        });

                        // After playback finishes, enqueue the next chunk beyond the window
                        enqueueFetch(i + PREFETCH_AHEAD + 1);
                    }
                } catch (e) {
                    if (e.name === 'AbortError') {
                        // User cancelled - not an error
                    } else {
                        console.error('TTS playback failed', e);
                        if (this.playlist.isActive && this.tts.onChapterEndedCallback) {
                            this.tts.onChapterEndedCallback();
                        } else {
                            alert('语音合成失败: ' + e.message);
                        }
                    }
                } finally {
                    this.tts.loading = null;
                    this.tts.playing = null;
                    this.tts.audio = null;
                    this.tts.abortController = null;
                    // Call callback for non-abort completion of streaming path
                    if (!abortController.signal.aborted && this.tts.onChapterEndedCallback) {
                        this.tts.onChapterEndedCallback();
                    }
                }
            },
            // ===== Full Listen (Playlist) =====
            startFullListen() {
                // Build playlist from chapters with content
                const chapterElements = document.querySelectorAll('[id^="chapter-"]');
                const chapters = [];
                chapterElements.forEach(el => {
                    const num = parseInt(el.id.replace('chapter-', ''));
                    if (!isNaN(num)) chapters.push(num);
                });
                if (chapters.length === 0) return;
                this.stopAudio();
                this.playlist.chapters = chapters;
                this.playlist.currentIndex = 0;
                this.playlist.isActive = true;
                this.playlist.paused = false;
                this.tts.onChapterEndedCallback = () => this.onPlaylistChapterEnded();
                this.savePlaylistState();
                this.playChapter(this.playlist.chapters[0]);
            },
            onPlaylistChapterEnded() {
                if (!this.playlist.isActive) return;
                if (this.playlist.currentIndex < this.playlist.chapters.length - 1) {
                    this.playlist.currentIndex++;
                    this.savePlaylistState();
                    this.playChapter(this.playlist.chapters[this.playlist.currentIndex]);
                } else {
                    // Finished all chapters
                    this.stopFullListen();
                }
            },
            playlistPause() {
                if (this.tts.audio) {
                    this.tts.audio.pause();
                }
                this.playlist.paused = true;
                this.savePlaylistState();
            },
            playlistResume() {
                if (this.tts.audio) {
                    this.tts.audio.play();
                    this.playlist.paused = false;
                } else {
                    // Audio lost, restart current chapter
                    this.playlist.paused = false;
                    this.playChapter(this.playlist.chapters[this.playlist.currentIndex]);
                }
                this.savePlaylistState();
            },
            playlistPrev() {
                if (!this.playlist.isActive || this.playlist.currentIndex <= 0) return;
                this.stopAudio();
                this.playlist.currentIndex--;
                this.playlist.paused = false;
                this.savePlaylistState();
                this.playChapter(this.playlist.chapters[this.playlist.currentIndex]);
            },
            playlistNext() {
                if (!this.playlist.isActive || this.playlist.currentIndex >= this.playlist.chapters.length - 1) return;
                this.stopAudio();
                this.playlist.currentIndex++;
                this.playlist.paused = false;
                this.savePlaylistState();
                this.playChapter(this.playlist.chapters[this.playlist.currentIndex]);
            },
            stopFullListen() {
                this.stopAudio();
                this.playlist.isActive = false;
                this.playlist.chapters = [];
                this.playlist.currentIndex = -1;
                this.playlist.paused = false;
                this.tts.onChapterEndedCallback = null;
                localStorage.removeItem('tts_playlist_' + projectId);
            },
            savePlaylistState() {
                try {
                    localStorage.setItem('tts_playlist_' + projectId, JSON.stringify({
                        chapters: this.playlist.chapters,
                        currentIndex: this.playlist.currentIndex,
                        currentChapter: this.playlist.chapters[this.playlist.currentIndex],
                        isActive: true
                    }));
                } catch (e) {}
            },
            loadPlaylistState() {
                try {
                    const saved = localStorage.getItem('tts_playlist_' + projectId);
                    if (saved) {
                        const state = JSON.parse(saved);
                        if (state.isActive && state.chapters && state.chapters.length > 0) {
                            this.playlistResumeOffer = true;
                            this.playlistResumeChapter = state.currentChapter || state.chapters[state.currentIndex];
                        }
                    }
                } catch (e) {}
            },
            acceptResume() {
                this.playlistResumeOffer = false;
                try {
                    const saved = JSON.parse(localStorage.getItem('tts_playlist_' + projectId));
                    this.playlist.chapters = saved.chapters;
                    this.playlist.currentIndex = saved.currentIndex;
                    this.playlist.isActive = true;
                    this.playlist.paused = false;
                    this.tts.onChapterEndedCallback = () => this.onPlaylistChapterEnded();
                    this.playChapter(this.playlist.chapters[this.playlist.currentIndex]);
                } catch (e) {
                    this.stopFullListen();
                }
            },
            dismissResume() {
                this.playlistResumeOffer = false;
                localStorage.removeItem('tts_playlist_' + projectId);
            },
            stopAudio() {
                if (this.tts.abortController) {
                    this.tts.abortController.abort();
                    this.tts.abortController = null;
                }
                if (this.tts.audio) {
                    this.tts.audio.pause();
                    this.tts.audio = null;
                }
                this.tts.playing = null;
            },
            onConfigChange() {
                // Reset voice to first available from new config
                const voices = this.getVoiceOptions();
                if (voices.length > 0 && !voices.includes(this.tts.voice)) {
                    this.tts.voice = voices[0];
                }
                this.saveTtsPrefs();
            },
            getVoiceOptions() {
                const defaultVoices = ['alloy', 'echo', 'fable', 'onyx', 'nova', 'shimmer'];
                if (!this.tts.selectedConfigId) return defaultVoices;
                const cfg = this.tts.configs.find(c => c.id == this.tts.selectedConfigId);
                if (cfg && cfg.voices) {
                    return cfg.voices.split(',').map(v => v.trim()).filter(v => v);
                }
                return defaultVoices;
            },
            getSelectedFormat() {
                if (!this.tts.selectedConfigId) return 'mp3';
                const cfg = this.tts.configs.find(c => c.id == this.tts.selectedConfigId);
                return (cfg && cfg.format) ? cfg.format : 'mp3';
            },
            exportUrl() {
                return `/tts-export?projectId=${projectId}`;
            }
        };
    }
    </script>
</body>
</html>
