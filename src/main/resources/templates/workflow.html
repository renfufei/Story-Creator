                                    this.loadProofreadData();
                                }
                                // Attach to live stream
                                this.attachBgStream(this.currentStep, 0);
                            }
                        })
                        .catch(() => {});
                },

                // Attach to a running background generation stream
                attachBgStream(step, chapter) {
                    if (this.currentEventSource) {
                        this.currentEventSource.close();
                    }
                    const url = `/projects/${this.projectId}/bg-gen/stream?step=${step}&chapter=${chapter}`;
                    const eventSource = new EventSource(url);
                    this.currentEventSource = eventSource;

                    // Handle replay-buffer: partial content of the currently generating item
                    eventSource.addEventListener('replay-buffer', (e) => {
                        // For outline/character/proofreading, the replay-buffer contains raw tokens
                        // including section markers. We don't re-process the full replay since
                        // loadOutlineData/loadCharacterList already loaded completed items from DB.
                        // The replay only helps show that generation is active.
                    });

                    if (step === 'OUTLINE_GENERATION') {
                        this.setupOutlineStreamEvents(eventSource);
                    } else if (step === 'CHARACTER_DESIGN') {
                        this.setupCharacterStreamEvents(eventSource);
                    } else if (step === 'PROOFREADING') {
                        this.setupProofreadStreamEvents(eventSource);
                    }
                },

                // Setup outline stream event handlers on an EventSource
                setupOutlineStreamEvents(eventSource) {
                    eventSource.addEventListener('outline-section', (e) => {
                        const marker = e.data;
                        const match = marker.match(/\[\[SECTION:(\w+)(?::(.+))?\]\]/);
                        if (!match) return;
                        const type = match[1];
                        const params = match[2] ? match[2].split(':') : [];

                        // Mark previously streaming chapter as COMPLETED
                        if (this.streamingTarget && (this.streamingTarget.type === 'CHAPTER' || this.streamingTarget.type === 'REFINE')) {
                            const prevVol = this.outlineVolumes.find(v => v.volumeNumber === this.streamingTarget.volumeNumber);
                            if (prevVol) {
                                const prevCh = prevVol.chapters.find(c => c.chapterNumber === this.streamingTarget.chapterNumber);
                                if (prevCh && prevCh.status === 'GENERATING') prevCh.status = 'COMPLETED';
                            }
                        }

                        if (type === 'VOLUME') {
                            const volNum = parseInt(params[0]);
                            const chStart = parseInt(params[1]);
                            const chEnd = parseInt(params[2]);
                            this.outlineStreamingStatus = `正在生成第${volNum}卷故事弧线...`;
                            let vol = this.outlineVolumes.find(v => v.volumeNumber === volNum);
                            if (!vol) {
                                vol = {
                                    volumeNumber: volNum, title: '第' + volNum + '卷',
                                    arcSummary: '', chapterStart: chStart, chapterEnd: chEnd,
                                    expanded: true, editingArc: false, arcSummaryEdit: '', chapters: []
                                };
                                this.outlineVolumes.push(vol);
                            }
                            this.streamingTarget = { type: 'VOLUME', volumeNumber: volNum };
                        } else if (type === 'CHAPTER') {
                            const chNum = parseInt(params[0]);
                            const volNum = parseInt(params[1]);
                            this.outlineStreamingStatus = `正在生成第${chNum}章大纲...`;
                            let vol = this.outlineVolumes.find(v => v.volumeNumber === volNum);
                            if (!vol) {
                                // Volume not yet in local state — create placeholder and reload from DB
                                vol = {
                                    volumeNumber: volNum, title: '第' + volNum + '卷',
                                    arcSummary: '', chapterStart: chNum, chapterEnd: chNum,
                                    expanded: true, editingArc: false, arcSummaryEdit: '', chapters: []
                                };
                                this.outlineVolumes.push(vol);
                                this.loadOutlineData(true);
                            } else {
                                // Check if there's a gap: previous chapters missing from local list
                                const maxExisting = vol.chapters.length > 0
                                    ? Math.max(...vol.chapters.map(c => c.chapterNumber))
                                    : vol.chapterStart - 1;
                                if (chNum > maxExisting + 1) {
                                    // Gap detected — reload completed chapters from DB
                                    this.loadOutlineData(true);
                                }
                            }
                            let ch = vol.chapters.find(c => c.chapterNumber === chNum);
                            if (!ch) {
                                ch = { chapterNumber: chNum, title: '', summary: '', characterNames: '',
                                       status: 'GENERATING', editing: false, titleEdit: '', summaryEdit: '', characterNamesEdit: '' };
                                vol.chapters.push(ch);
                            } else {
                                ch.status = 'GENERATING';
                            }
                            this.streamingTarget = { type: 'CHAPTER', chapterNumber: chNum, volumeNumber: volNum };
                        } else if (type === 'REFINE') {
                            const chNum = parseInt(params[0]);
                            const volNum = parseInt(params[1]);
                            this.outlineStreamingStatus = `正在精修第${chNum}章大纲...`;
                            let vol = this.outlineVolumes.find(v => v.volumeNumber === volNum);
                            if (vol) {
                                let ch = vol.chapters.find(c => c.chapterNumber === chNum);
                                if (ch) {
                                    ch.summary = '';
                                    ch.title = '';
                                    ch.characterNames = '';
                                    ch.status = 'GENERATING';
                                }
                            }
                            this.streamingTarget = { type: 'REFINE', chapterNumber: chNum, volumeNumber: volNum };
                        } else if (type === 'SUMMARY') {
                            this.outlineStreamingStatus = '正在生成故事总纲...';
                            this.streamingTarget = { type: 'SUMMARY' };
                        }
                    });

                    eventSource.addEventListener('token', (e) => {
                        const token = e.data;
                        if (this.streamingTarget) {
                            if (this.streamingTarget.type === 'VOLUME') {
                                const vol = this.outlineVolumes.find(v => v.volumeNumber === this.streamingTarget.volumeNumber);
                                if (vol) vol.arcSummary += token;
                            } else if (this.streamingTarget.type === 'CHAPTER' || this.streamingTarget.type === 'REFINE') {
                                const vol = this.outlineVolumes.find(v => v.volumeNumber === this.streamingTarget.volumeNumber);
                                if (vol) {
                                    const ch = vol.chapters.find(c => c.chapterNumber === this.streamingTarget.chapterNumber);
                                    if (ch) {
                                        ch.summary += token;
                                        if (!ch.title) {
                                            const titleMatch = ch.summary.match(/\*\*标题[：:]\*\*\s*(.+)/);
                                            if (titleMatch) ch.title = titleMatch[1].trim();
                                        }
                                        if (!ch.characterNames) {
                                            const charMatch = ch.summary.match(/\*\*出场角色[：:]\*\*\s*(.+)/);
                                            if (charMatch) ch.characterNames = charMatch[1].trim();
                                        }
                                    }
                                }
                            } else if (this.streamingTarget.type === 'SUMMARY') {
                                this.outlineSummary += token;
                            }
                        }
                    });

                    eventSource.addEventListener('done', () => {
                        this.generating = false;
                        this.currentEventSource = null;
                        this.streamingTarget = null;
                        this.outlineStreamingStatus = '';
                        this.outlineLoaded = true;
                        this.stopElapsedTimer();
                        eventSource.close();
                        this.loadOutlineData();
                    });

                    eventSource.addEventListener('stopped', () => {
                        this.generating = false;
                        this.currentEventSource = null;
                        this.streamingTarget = null;
                        this.outlineStreamingStatus = '';
                        this.stopElapsedTimer();
                        eventSource.close();
                        this.loadOutlineData();
                    });

                    eventSource.addEventListener('error', (e) => {
                        this.generating = false;
                        this.currentEventSource = null;
                        this.streamingTarget = null;
                        this.outlineStreamingStatus = '';
                        this.stopElapsedTimer();
                        if (e.data) alert('生成出错: ' + e.data);
                        eventSource.close();
                    });

                    // For bg streams, SSE disconnect doesn't mean failure - task continues in background
                    eventSource.onerror = () => {
                        this.currentEventSource = null;
                        eventSource.close();
                        // Don't set generating=false - task may still be running in background
                    };
                },

                // Setup character design stream event handlers
                setupCharacterStreamEvents(eventSource) {
                    eventSource.addEventListener('char-section', (e) => {
                        this.loadCharacterList();
                    });

                    eventSource.addEventListener('token', (e) => {
                        this.generatedContent += e.data;
                        if (this.$refs.output) {
                            this.$refs.output.scrollTop = this.$refs.output.scrollHeight;
                        }
                    });

                    eventSource.addEventListener('done', () => {
                        this.generating = false;
                        this.currentEventSource = null;
                        this.editableContent = this.generatedContent;
                        this.editing = false;
                        this.stopElapsedTimer();
                        eventSource.close();
                        this.loadCharacterList();
                    });

                    eventSource.addEventListener('stopped', () => {
                        this.generating = false;
                        this.currentEventSource = null;
                        this.stopElapsedTimer();
                        eventSource.close();
                        this.loadCharacterList();
                    });

                    eventSource.addEventListener('error', (e) => {
                        this.generating = false;
                        this.currentEventSource = null;
                        this.stopElapsedTimer();
                        if (e.data) alert('生成出错: ' + e.data);
                        eventSource.close();
                    });

                    eventSource.onerror = () => {
                        this.currentEventSource = null;
                        eventSource.close();
                    };
                },

                // Setup proofreading stream event handlers
                setupProofreadStreamEvents(eventSource) {
                    eventSource.addEventListener('proofread-section', (e) => {
                        const match = e.data.match(/\[\[PROOFREAD:CHAPTER:(\d+):(\w+)\]\]/);
                        if (match) {
                            this.proofreadStreaming = {
                                chapterNumber: parseInt(match[1]),
                                substep: match[2]
                            };
                            this.proofreadFixGenerating = false;
                        }
                    });

                    eventSource.addEventListener('proofread-fix-section', (e) => {
                        const match = e.data.match(/\[\[PROOFREAD_FIX:CHAPTER:(\d+)\]\]/);
                        if (match) {
                            const chNum = parseInt(match[1]);
                            this.proofreadStreaming = {
                                chapterNumber: chNum,
                                substep: 'FIX'
                            };
                            this.proofreadFixGenerating = true;
                            this.proofreadFixChapterNum = chNum;
                            this.proofreadFixContent = '';
                        }
                    });

                    eventSource.addEventListener('token', (e) => {
                        this.generatedContent += e.data;
                        if (this.proofreadFixGenerating) {
                            this.proofreadFixContent += e.data;
                        }
                    });

                    eventSource.addEventListener('done', () => {
                        this.generating = false;
                        this.proofreadStreaming = null;
                        this.proofreadFixGenerating = false;
                        this.currentEventSource = null;
                        this.stopElapsedTimer();
                        eventSource.close();
                        this.loadProofreadData();
                    });

                    eventSource.addEventListener('stopped', () => {
                        this.generating = false;
                        this.proofreadStreaming = null;
                        this.proofreadFixGenerating = false;
                        this.currentEventSource = null;
                        this.stopElapsedTimer();
                        eventSource.close();
                        this.loadProofreadData();
                    });

                    eventSource.addEventListener('error', (e) => {
                        this.generating = false;
                        this.proofreadStreaming = null;
                        this.currentEventSource = null;
                        this.stopElapsedTimer();
                        if (e.data) alert('校对出错: ' + e.data);
                        eventSource.close();
                    });

                    eventSource.onerror = () => {
                        this.currentEventSource = null;
                        eventSource.close();
                    };
                },

                checkAutoRunStatus() {
                    fetch(`/projects/${this.projectId}/auto-run/status`)
                        .then(r => r.json())
                        .then(data => {
                            if (data.status === 'RUNNING' || data.status === 'STOPPING') {
                                this.fullAutoRunning = true;
                                this.fullAutoStatus = data.progress || '运行中...';
                                this.fullAutoError = '';
                                this.startAutoRunPolling();
                            } else if (data.status === 'FAILED') {
                                this.fullAutoError = data.error || '未知错误';
                            }
                        });
                },

                generate() {
                    this.generating = true;
                    this.generatedContent = '';
                    this.viewingChapterNum = 0;
                    this.viewingChapterTitle = '';
                    if (['OUTLINE_GENERATION','CHARACTER_DESIGN','PROOFREADING'].includes(this.currentStep)) {
                        // Background generation mode for multi-step flows
                        if (this.currentStep === 'OUTLINE_GENERATION') {
                            this.outlineVolumes = [];
                            this.outlineSummary = '';
                            this.streamingTarget = null;
                            this.outlineLoaded = false;
                            this.outlineStreamingStatus = '正在生成分卷大纲...';
                        } else if (this.currentStep === 'PROOFREADING') {
                            this.proofreadStreaming = { chapterNumber: 0, substep: '' };
                        }
                        fetch(`/projects/${this.projectId}/bg-gen/start?step=${this.currentStep}&chapter=0`, {method:'POST'})
                            .then(r => r.json())
                            .then(data => {
                                if (data.status === 'ok') {
                                    this.startElapsedTimer();
                                    this.attachBgStream(this.currentStep, 0);
                                } else {
                                    alert('启动失败: ' + data.message);
                                    this.generating = false;
                                }
                            })
                            .catch(err => {
                                alert('启动失败: ' + err);
                                this.generating = false;
                            });
                    } else {
                        const url = `/projects/${this.projectId}/generate?step=${this.currentStep}`;
                        this.startSSE(url);
                    }
                },

                generateChapter(num) {
                    this.generating = true;
                    this.generatedContent = '';
                    this.viewingChapterNum = num;
                    this.viewingChapterTitle = '';
                    const url = `/projects/${this.projectId}/generate?step=CHAPTER_WRITING&chapter=${num}`;
                    this.startSSE(url, () => this.loadChapterList());
                },

                polishChapter(num) {
                    this.generating = true;
                    this.generatedContent = '';
                    this.viewingChapterNum = num;
                    this.viewingChapterTitle = '';
                    // Close existing preview for this chapter, will re-open after done
                    const { [num]: _, ...restPrev } = this.polishPreviews;
                    this.polishPreviews = restPrev;
                    // Load current content as draft for left panel comparison
                    fetch(`/projects/${this.projectId}/chapters/${num}/content`)
                        .then(r => r.json())
                        .then(data => {
                            this.viewingChapterDraft = data.content || '';
                        });
                    const url = `/projects/${this.projectId}/generate?step=POLISHING&chapter=${num}`;
                    this.startSSE(url, () => {
                        // After polish done, auto-show inline preview
                        if (this.viewingChapterDraft && this.generatedContent) {
                            this.polishPreviews = { ...this.polishPreviews, [num]: {
                                draft: this.viewingChapterDraft,
                                content: this.generatedContent
                            }};
                        }
                        this.viewingChapterDraft = '';
                        this.loadChapterList();
                    });
                },

                generateNextChapter() {
                    const nextNum = this.chapterListData.length + 1;
                    if (nextNum > this.totalChapters) {
                        alert('已达到设定的最大章节数: ' + this.totalChapters);
                        return;
                    }
                    this.generateChapterWithAutoSave(nextNum);
                },

                generateAllChapters() {
                    // Find first chapter with no valid content (wordCount=0)
                    let startNum = this.totalChapters + 1;
                    for (let i = 0; i < this.chapterListData.length; i++) {
                        const ch = this.chapterListData[i];
                        if (ch.wordCount === 0) {
                            startNum = ch.chapterNumber;
                            break;
                        }
                    }
                    // If all existing chapters have content, start from next new chapter
                    if (startNum > this.totalChapters && this.chapterListData.length < this.totalChapters) {
                        startNum = this.chapterListData.length + 1;
                    }
                    if (startNum > this.totalChapters) {
                        alert('所有章节已生成完毕！');
                        return;
                    }
                    this.autoGenerating = true;
                    this.autoGenerateFrom(startNum);
                },

                autoGenerateFrom(chapterNum) {
                    if (chapterNum > this.totalChapters || !this.autoGenerating) {
                        this.autoGenerating = false;
                        this.autoProgress = '';
                        if (chapterNum > this.totalChapters) {
                            alert('全部章节自动生成完成！共 ' + this.totalChapters + ' 章');
                        }
                        this.loadChapterList();
                        return;
                    }
                    this.autoProgress = `正在自动生成第 ${chapterNum}/${this.totalChapters} 章...`;
                    this.generateChapterWithAutoSave(chapterNum, () => {
                        this.loadChapterList();
                        if (this.autoGenerating) {
                            this.autoGenerateFrom(chapterNum + 1);
                        }
                    });
                },

                generateChapterWithAutoSave(num, onComplete) {
                    this.generating = true;
                    this.generatedContent = '';
                    this.viewingChapterNum = num;
                    this.viewingChapterTitle = '';
                    const url = `/projects/${this.projectId}/generate?step=CHAPTER_WRITING&chapter=${num}`;
                    this.startSSE(url, onComplete);
                },

                batchPolish() {
                    const needsPolish = this.chapterListData.filter(ch =>
                        ch.polishStatus !== 'CONFIRMED'
                    );
                    if (needsPolish.length === 0) {
                        alert('所有章节均已润色完毕！');
                        return;
                    }
                    this.autoGenerating = true;
                    this.batchPolishList = needsPolish.map(ch => ch.chapterNumber);
                    this.batchPolishIndex = 0;
                    this.batchPolishNext();
                },

                batchPolishNext() {
                    if (this.batchPolishIndex >= this.batchPolishList.length || !this.autoGenerating) {
                        this.autoGenerating = false;
                        this.autoProgress = '';
                        this.viewingChapterDraft = '';
                        if (this.batchPolishIndex >= this.batchPolishList.length) {
                            alert('批量润色完成！');
                        }
                        this.loadChapterList();
                        return;
                    }
                    const chNum = this.batchPolishList[this.batchPolishIndex];
                    this.autoProgress = `正在润色第 ${chNum} 章（${this.batchPolishIndex + 1}/${this.batchPolishList.length}）...`;
                    this.generating = true;
                    this.generatedContent = '';
                    this.viewingChapterNum = chNum;
                    // Load draft for inline split-view
                    fetch(`/projects/${this.projectId}/chapters/${chNum}/content`)
                        .then(r => r.json())
                        .then(data => { this.viewingChapterDraft = data.content || ''; });
                    const url = `/projects/${this.projectId}/generate?step=POLISHING&chapter=${chNum}`;
                    this.startSSE(url, () => {
                        // Auto-show inline preview after done
                        if (this.viewingChapterDraft && this.generatedContent) {
                            this.polishPreviews = { ...this.polishPreviews, [chNum]: {
                                draft: this.viewingChapterDraft,
                                content: this.generatedContent
                            }};
                        }
                        this.viewingChapterDraft = '';
                        this.batchPolishIndex++;
                        this.loadChapterList();
                        if (this.autoGenerating) {
                            this.batchPolishNext();
                        }
                    });
                },

                generateAllTitles() {
                    if (!confirm('将为所有章节自动生成标题，确认继续？')) return;
                    this.generating = true;
                    this.autoProgress = '正在生成章节标题...';
                    const url = `/projects/${this.projectId}/chapters/generate-titles`;
                    const eventSource = new EventSource(url);
                    this.currentEventSource = eventSource;
                    eventSource.addEventListener('title', (e) => {
                        const [num, ...titleParts] = e.data.split('|');
                        const title = titleParts.join('|');
                        this.autoProgress = `已生成第 ${num} 章标题: ${title}`;
                        const ch = this.chapterListData.find(c => c.chapterNumber == num);
                        if (ch) ch.title = title;
                    });
                    eventSource.addEventListener('done', () => {
                        this.generating = false;
                        this.autoProgress = '';
                        this.currentEventSource = null;
                        eventSource.close();
                        this.loadChapterList();
                    });
                    eventSource.addEventListener('error', (e) => {
                        this.generating = false;
                        this.autoProgress = '';
                        this.currentEventSource = null;
                        if (e.data) alert('生成标题出错: ' + e.data);
                        eventSource.close();
                    });
                    eventSource.onerror = () => {
                        this.generating = false;
                        this.autoProgress = '';
                        this.currentEventSource = null;
                        eventSource.close();
                    };
                },

                startSSE(url, onComplete) {
                    if (this.currentEventSource) {
                        this.currentEventSource.close();
                    }
                    this.startElapsedTimer();
                    const eventSource = new EventSource(url);
                    this.currentEventSource = eventSource;
                    eventSource.addEventListener('token', (e) => {
                        this.generatedContent += e.data;
                        if (this.$refs.output) {
                            this.$refs.output.scrollTop = this.$refs.output.scrollHeight;
                        }
                    });
                    eventSource.addEventListener('char-section', (e) => {
                        // Each character card/overview saved — refresh card list
                        this.loadCharacterList();
                    });
                    eventSource.addEventListener('done', () => {
                        this.generating = false;
                        this.currentEventSource = null;
                        this.editableContent = this.generatedContent;
                        this.editing = false;
                        this.stopElapsedTimer();
                        eventSource.close();
                        this.loadCharacterList();
                        if (onComplete) {
                            onComplete();
                        }
                    });
                    eventSource.addEventListener('error', (e) => {
                        this.generating = false;
                        this.autoGenerating = false;
                        this.autoProgress = '';
                        this.currentEventSource = null;
                        this.stopElapsedTimer();
                        if (e.data) {
                            alert('生成出错: ' + e.data);
                        }
                        eventSource.close();
                    });
                    eventSource.onerror = () => {
                        this.generating = false;
                        this.autoGenerating = false;
                        this.autoProgress = '';
                        this.stopElapsedTimer();
                        this.currentEventSource = null;
                        eventSource.close();
                    };
                },

                startElapsedTimer() {
                    this.generateStartTime = Date.now();
                    this.generateElapsed = '0:00';
                    if (this.generateTimer) clearInterval(this.generateTimer);
                    this.generateTimer = setInterval(() => {
                        const seconds = Math.floor((Date.now() - this.generateStartTime) / 1000);
                        const min = Math.floor(seconds / 60);
                        const sec = seconds % 60;
                        this.generateElapsed = min + ':' + (sec < 10 ? '0' : '') + sec;
                    }, 1000);
                },

                stopElapsedTimer() {
                    if (this.generateTimer) {
                        clearInterval(this.generateTimer);
                        this.generateTimer = null;
                    }
                    // Keep generateElapsed showing the final value
                    if (this.generateStartTime) {
                        const seconds = Math.floor((Date.now() - this.generateStartTime) / 1000);
                        const min = Math.floor(seconds / 60);
                        const sec = seconds % 60;
                        this.generateElapsed = min + ':' + (sec < 10 ? '0' : '') + sec;
                    }
                },

                stopAutoGenerate() {
                    this.autoGenerating = false;
                    this.autoProgress = '';
                    this.generating = false;
                    this.stopElapsedTimer();
                    if (this.currentEventSource) {
                        this.currentEventSource.close();
                        this.currentEventSource = null;
                    }
                    // Stop background task for multi-step flows
                    if (['OUTLINE_GENERATION','CHARACTER_DESIGN','PROOFREADING'].includes(this.currentStep)) {
                        fetch(`/projects/${this.projectId}/bg-gen/stop?step=${this.currentStep}&chapter=0`, {method:'POST'});
                    }
                },

                loadChapterList() {
                    fetch(`/projects/${this.projectId}/chapters/list`)
                        .then(r => r.json())
                        .then(data => { this.chapterListData = data; })
                        .catch(err => console.error('Failed to load chapters:', err));
                },

                previewChapter(num) {
                    fetch(`/projects/${this.projectId}/chapters/${num}/content`)
                        .then(r => {
                            if (!r.ok) throw new Error('请求失败');
                            return r.json();
                        })
                        .then(data => {
                            if (this.currentStep === 'CHAPTER_WRITING') {
                                // Inline preview mode
                                this.inlinePreviewChapter = num;
                                this.inlinePreviewContent = data.content || '（暂无内容）';
                                this.inlinePreviewEditing = false;
                                this.inlinePreviewEditContent = '';
                            } else if (this.currentStep === 'POLISHING') {
                                // Inline polish preview (toggle)
                                if (this.polishPreviews[num]) {
                                    const { [num]: _, ...rest } = this.polishPreviews;
                                    this.polishPreviews = rest;
                                } else {
                                    this.polishPreviews = { ...this.polishPreviews, [num]: {
                                        draft: data.contentDraft || '',
                                        content: data.content || '（暂无内容）'
                                    }};
                                }
                            } else {
                                this.editableContent = data.content || '（暂无内容）';
                                this.existingContent = data.content || '';
                                this.generatedContent = '';
                                this.editing = false;
                                this.viewingChapterNum = data.chapterNumber;
                                this.viewingChapterTitle = data.title || '';
                                this.viewingChapterDraft = data.contentDraft || '';
                            }
                        })
                        .catch(err => alert('加载章节内容失败'));
                },

                closeInlinePreview() {
                    this.inlinePreviewChapter = 0;
                    this.inlinePreviewContent = '';
                    this.inlinePreviewEditing = false;
                },

                startInlineEdit() {
                    this.inlinePreviewEditing = true;
                    this.inlinePreviewEditContent = this.inlinePreviewContent;
                },

                saveInlineEdit() {
                    const num = this.inlinePreviewChapter;
                    const content = this.inlinePreviewEditContent;
                    const formData = new FormData();
                    formData.append('content', content);
                    fetch(`/projects/${this.projectId}/chapters/${num}/save-ajax`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === 'ok') {
                            this.inlinePreviewContent = content;
                            this.inlinePreviewEditing = false;
                            this.loadChapterList();
                        }
                    })
                    .catch(err => alert('保存失败: ' + err));
                },

                savePolishEdit(num) {
                    const content = this.polishEditContent;
                    const formData = new FormData();
                    formData.append('content', content);
                    fetch(`/projects/${this.projectId}/chapters/${num}/save-ajax`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === 'ok') {
                            // Update inline preview content
                            if (this.polishPreviews[num]) {
                                this.polishPreviews = { ...this.polishPreviews, [num]: {
                                    ...this.polishPreviews[num],
                                    content: content
                                }};
                            }
                            this.polishEditingChapter = null;
                            this.loadChapterList();
                        }
                    })
                    .catch(err => alert('保存失败: ' + err));
                },

                initGlobalScrollSync() {
                    let syncing = false;
                    document.addEventListener('scroll', (e) => {
                        if (syncing) return;
                        const source = e.target;
                        if (!source.classList || !source.classList.contains('split-panel-content')) return;
                        const container = source.closest('.split-view-container');
                        if (!container) return;
                        const panels = container.querySelectorAll('.split-panel-content');
                        if (panels.length < 2) return;
                        const target = panels[0] === source ? panels[1] : panels[0];
                        syncing = true;
                        const max = source.scrollHeight - source.clientHeight;
                        const ratio = max > 0 ? source.scrollTop / max : 0;
                        target.scrollTop = ratio * (target.scrollHeight - target.clientHeight);
                        syncing = false;
                    }, true);
                },

                editPolishNote(chapterNum, currentNote) {
                    this.polishNoteChapter = chapterNum;
                    this.polishNoteText = currentNote || '';
                    if (!this.polishNoteModal) {
                        this.polishNoteModal = new bootstrap.Modal(document.getElementById('polishNoteModal'));
                    }
                    this.polishNoteModal.show();
                },

                savePolishNote() {
                    const formData = new FormData();
                    formData.append('note', this.polishNoteText);
                    fetch(`/projects/${this.projectId}/chapters/${this.polishNoteChapter}/polish-note`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(r => r.json())
                    .then(() => {
                        if (this.polishNoteModal) this.polishNoteModal.hide();
                        this.loadChapterList();
                    })
                    .catch(err => alert('保存失败: ' + err));
                },

                saveGuidance() {
                    const formData = new FormData();
                    formData.append('step', this.currentStep);
                    formData.append('guidance', this.stepGuidanceEdit);
                    fetch(`/projects/${this.projectId}/step-guidance`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(r => r.json())
                    .then(() => {
                        this.stepGuidance = this.stepGuidanceEdit;
                        this.editingGuidance = false;
                    })
                    .catch(err => alert('保存失败: ' + err));
                },

                confirmStep() {
                    fetch(`/projects/${this.projectId}/confirm-only-ajax?step=${this.currentStep}`, {method:'POST'})
                        .then(r => r.json())
                        .then(data => {
                            if (data.status === 'ok') {
                                this.stepConfirmed = true;
                            }
                        });
                },

                advanceStep() {
                    fetch(`/projects/${this.projectId}/advance-ajax?step=${this.currentStep}`, {method:'POST'})
                        .then(r => r.json())
                        .then(data => {
                            if (data.status === 'ok') {
                                location.reload();
                            }
                        });
                },

                // === Character Management Methods ===

                loadCharacterList() {
                    if (this.currentStep !== 'CHARACTER_DESIGN') return;
                    fetch(`/projects/${this.projectId}/characters`)
                        .then(r => r.json())
                        .then(data => { this.characterList = data; })
                        .catch(err => console.error('Failed to load characters:', err));
                },

                editCharacter(ch) {
                    this.editingCharacterId = ch.id;
                    this.editForm = { ...ch };
                },

                saveCharacter() {
                    const formData = new FormData();
                    const fields = ['name', 'gender', 'age', 'role', 'personality', 'appearance', 'background', 'motivation', 'abilities', 'relationships', 'description'];
                    fields.forEach(f => { if (this.editForm[f] != null) formData.append(f, this.editForm[f]); });
                    fetch(`/projects/${this.projectId}/characters/${this.editingCharacterId}`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(r => r.json())
                    .then(() => {
                        this.editingCharacterId = null;
                        this.loadCharacterList();
                    })
                    .catch(err => alert('保存失败: ' + err));
                },

                addCharacter() {
                    if (!this.newCharacterName.trim()) { alert('请输入角色姓名'); return; }
                    const formData = new FormData();
                    formData.append('name', this.newCharacterName.trim());
                    fetch(`/projects/${this.projectId}/characters/add`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(r => r.json())
                    .then(() => {
                        this.newCharacterName = '';
                        this.showAddCharacter = false;
                        this.loadCharacterList();
                    })
                    .catch(err => alert('添加失败: ' + err));
                },

                deleteCharacter(id) {
                    if (!confirm('确定删除该角色？')) return;
                    fetch(`/projects/${this.projectId}/characters/${id}/delete`, { method: 'POST' })
                        .then(r => r.json())
                        .then(() => this.loadCharacterList())
                        .catch(err => alert('删除失败: ' + err));
                },

                // === Outline Accordion Methods ===

                loadOutlineData(mergeOnly = false) {
                    if (mergeOnly && this._outlineMergeLoading) return;
                    if (mergeOnly) this._outlineMergeLoading = true;
                    fetch(`/projects/${this.projectId}/outline/data`)
                        .then(r => r.json())
                        .then(data => {
                            if (mergeOnly) this._outlineMergeLoading = false;
                            if (mergeOnly && this.generating) {
                                // Merge mode: only add missing chapters from DB without disrupting streaming state
                                this.outlineSummary = data.storySummary || this.outlineSummary;
                                if (data.volumes && data.volumes.length > 0) {
                                    for (const sv of data.volumes) {
                                        let vol = this.outlineVolumes.find(v => v.volumeNumber === sv.volumeNumber);
                                        if (!vol) {
                                            vol = {
                                                volumeNumber: sv.volumeNumber, title: sv.title,
                                                arcSummary: sv.arcSummary || '', chapterStart: sv.chapterStart,
                                                chapterEnd: sv.chapterEnd, expanded: true,
                                                editingArc: false, arcSummaryEdit: '', chapters: []
                                            };
                                            this.outlineVolumes.push(vol);
                                        } else if (!vol.arcSummary && sv.arcSummary) {
                                            vol.arcSummary = sv.arcSummary;
                                        }
                                        for (const sch of (sv.chapters || [])) {
                                            let existingCh = vol.chapters.find(c => c.chapterNumber === sch.chapterNumber);
                                            if (!existingCh) {
                                                vol.chapters.push({
                                                    chapterNumber: sch.chapterNumber,
                                                    title: sch.title || '', summary: sch.summary || '',
                                                    characterNames: sch.characterNames || '',
                                                    status: sch.status || 'COMPLETED',
                                                    editing: false, regenerating: false,
                                                    titleEdit: '', summaryEdit: '', characterNamesEdit: ''
                                                });
                                            } else if (sch.status) {
                                                existingCh.status = sch.status;
                                            }
                                        }
                                        vol.chapters.sort((a, b) => a.chapterNumber - b.chapterNumber);
                                    }
                                    this.outlineVolumes.sort((a, b) => a.volumeNumber - b.volumeNumber);
                                }
                                return;
                            }
                            this.outlineSummary = data.storySummary || '';
                            if (data.volumes && data.volumes.length > 0) {
                                this.outlineVolumes = data.volumes.map(v => ({
                                    volumeNumber: v.volumeNumber,
                                    title: v.title,
                                    arcSummary: v.arcSummary || '',
                                    chapterStart: v.chapterStart,
                                    chapterEnd: v.chapterEnd,
                                    expanded: true,
                                    editingArc: false,
                                    arcSummaryEdit: '',
                                    chapters: (v.chapters || []).map(ch => ({
                                        chapterNumber: ch.chapterNumber,
                                        title: ch.title || '',
                                        summary: ch.summary || '',
                                        characterNames: ch.characterNames || '',
                                        status: ch.status || 'COMPLETED',
                                        editing: false,
                                        regenerating: false,
                                        titleEdit: '',
                                        summaryEdit: '',
                                        characterNamesEdit: ''
                                    }))
                                }));
                                this.outlineLoaded = true;
                            } else if (data.legacyChapters && data.legacyChapters.length > 0) {
                                // Legacy data: show as a single volume
                                this.outlineVolumes = [{
                                    volumeNumber: 1,
                                    title: '全部章节',
                                    arcSummary: '',
                                    chapterStart: 1,
                                    chapterEnd: data.legacyChapters.length,
                                    expanded: true,
                                    editingArc: false,
                                    arcSummaryEdit: '',
                                    chapters: data.legacyChapters.map(ch => ({
                                        chapterNumber: ch.chapterNumber,
                                        title: ch.title || '',
                                        summary: ch.summary || '',
                                        characterNames: ch.characterNames || '',
                                        status: ch.status || 'COMPLETED',
                                        editing: false,
                                        regenerating: false,
                                        titleEdit: '',
                                        summaryEdit: '',
                                        characterNamesEdit: ''
                                    }))
                                }];
                                this.outlineLoaded = true;
                            }
                        })
                        .catch(err => {
                            this._outlineMergeLoading = false;
                            console.error('Failed to load outline data:', err);
                        });
                },

                startOutlineSSE(url) {
                    if (this.currentEventSource) {
                        this.currentEventSource.close();
                    }
                    this.startElapsedTimer();
                    const eventSource = new EventSource(url);
                    this.currentEventSource = eventSource;

                    eventSource.addEventListener('outline-section', (e) => {
                        const marker = e.data;
                        // Parse marker: SECTION:TYPE:params
                        const match = marker.match(/\[\[SECTION:(\w+)(?::(.+))?\]\]/);
                        if (!match) return;
                        const type = match[1];
                        const params = match[2] ? match[2].split(':') : [];

                        // Mark previously streaming chapter as COMPLETED
                        if (this.streamingTarget && (this.streamingTarget.type === 'CHAPTER' || this.streamingTarget.type === 'REFINE')) {
                            const prevVol = this.outlineVolumes.find(v => v.volumeNumber === this.streamingTarget.volumeNumber);
                            if (prevVol) {
                                const prevCh = prevVol.chapters.find(c => c.chapterNumber === this.streamingTarget.chapterNumber);
                                if (prevCh && prevCh.status === 'GENERATING') prevCh.status = 'COMPLETED';
                            }
                        }

                        if (type === 'VOLUME') {
                            const volNum = parseInt(params[0]);
                            const chStart = parseInt(params[1]);
                            const chEnd = parseInt(params[2]);
                            this.outlineStreamingStatus = `正在生成第${volNum}卷故事弧线...`;
                            // Add or find volume
                            let vol = this.outlineVolumes.find(v => v.volumeNumber === volNum);
                            if (!vol) {
                                vol = {
                                    volumeNumber: volNum, title: '第' + volNum + '卷',
                                    arcSummary: '', chapterStart: chStart, chapterEnd: chEnd,
                                    expanded: true, editingArc: false, arcSummaryEdit: '', chapters: []
                                };
                                this.outlineVolumes.push(vol);
                            }
                            this.streamingTarget = { type: 'VOLUME', volumeNumber: volNum };
                        } else if (type === 'CHAPTER') {
                            const chNum = parseInt(params[0]);
                            const volNum = parseInt(params[1]);
                            this.outlineStreamingStatus = `正在生成第${chNum}章大纲...`;
                            // Find or create chapter entry in the correct volume
                            let vol = this.outlineVolumes.find(v => v.volumeNumber === volNum);
                            if (vol) {
                                let ch = vol.chapters.find(c => c.chapterNumber === chNum);
                                if (!ch) {
                                    ch = { chapterNumber: chNum, title: '', summary: '', characterNames: '',
                                           status: 'GENERATING', editing: false, titleEdit: '', summaryEdit: '', characterNamesEdit: '' };
                                    vol.chapters.push(ch);
                                } else {
                                    ch.status = 'GENERATING';
                                }
                            }
                            this.streamingTarget = { type: 'CHAPTER', chapterNumber: chNum, volumeNumber: volNum };
                        } else if (type === 'REFINE') {
                            const chNum = parseInt(params[0]);
                            const volNum = parseInt(params[1]);
                            this.outlineStreamingStatus = `正在精修第${chNum}章大纲...`;
                            let vol = this.outlineVolumes.find(v => v.volumeNumber === volNum);
                            if (vol) {
                                let ch = vol.chapters.find(c => c.chapterNumber === chNum);
                                if (ch) {
                                    ch.summary = '';
                                    ch.title = '';
                                    ch.characterNames = '';
                                    ch.status = 'GENERATING';
                                }
                            }
                            this.streamingTarget = { type: 'REFINE', chapterNumber: chNum, volumeNumber: volNum };
                        } else if (type === 'SUMMARY') {
                            this.outlineStreamingStatus = '正在生成故事总纲...';
                            this.streamingTarget = { type: 'SUMMARY' };
                        }
                    });

                    eventSource.addEventListener('token', (e) => {
                        const token = e.data;
                        if (this.streamingTarget) {
                            if (this.streamingTarget.type === 'VOLUME') {
                                const vol = this.outlineVolumes.find(v => v.volumeNumber === this.streamingTarget.volumeNumber);
                                if (vol) vol.arcSummary += token;
                            } else if (this.streamingTarget.type === 'CHAPTER' || this.streamingTarget.type === 'REFINE') {
                                const vol = this.outlineVolumes.find(v => v.volumeNumber === this.streamingTarget.volumeNumber);
                                if (vol) {
                                    const ch = vol.chapters.find(c => c.chapterNumber === this.streamingTarget.chapterNumber);
                                    if (ch) {
                                        ch.summary += token;
                                        // Try to extract title from streaming text
                                        if (!ch.title) {
                                            const titleMatch = ch.summary.match(/\*\*标题[：:]\*\*\s*(.+)/);
                                            if (titleMatch) ch.title = titleMatch[1].trim();
                                        }
                                        // Try to extract characters
                                        if (!ch.characterNames) {
                                            const charMatch = ch.summary.match(/\*\*出场角色[：:]\*\*\s*(.+)/);
                                            if (charMatch) ch.characterNames = charMatch[1].trim();
                                        }
                                    }
                                }
                            } else if (this.streamingTarget.type === 'SUMMARY') {
                                this.outlineSummary += token;
                            }
                        }
                    });

                    eventSource.addEventListener('done', () => {
                        this.generating = false;
                        this.currentEventSource = null;
                        this.streamingTarget = null;
                        this.outlineStreamingStatus = '';
                        this.outlineLoaded = true;
                        this.stopElapsedTimer();
                        eventSource.close();
                        // Reload data from server to get properly parsed data
                        this.loadOutlineData();
                    });

                    eventSource.addEventListener('error', (e) => {
                        this.generating = false;
                        this.currentEventSource = null;
                        this.streamingTarget = null;
                        this.outlineStreamingStatus = '';
                        this.stopElapsedTimer();
                        if (e.data) alert('生成出错: ' + e.data);
                        eventSource.close();
                    });

                    eventSource.onerror = () => {
                        this.generating = false;
                        this.currentEventSource = null;
                        this.streamingTarget = null;
                        this.outlineStreamingStatus = '';
                        this.stopElapsedTimer();
                        eventSource.close();
                    };
                },

                editOutlineSummary() {
                    this.editingSummary = true;
                    this.outlineSummaryEdit = this.outlineSummary;
                },

                saveOutlineSummary() {
                    const formData = new FormData();
                    formData.append('content', this.outlineSummaryEdit);
                    fetch(`/projects/${this.projectId}/outline/edit-summary`, { method: 'POST', body: formData })
                        .then(r => r.json())
                        .then(() => {
                            this.outlineSummary = this.outlineSummaryEdit;
                            this.editingSummary = false;
                        })
                        .catch(err => alert('保存失败: ' + err));
                },

                editVolumeArc(vol) {
                    vol.editingArc = true;
                    vol.arcSummaryEdit = vol.arcSummary;
                },

                saveVolumeArc(vol) {
                    const formData = new FormData();
                    formData.append('volumeNumber', vol.volumeNumber);
                    formData.append('arcSummary', vol.arcSummaryEdit);
                    fetch(`/projects/${this.projectId}/outline/edit-volume`, { method: 'POST', body: formData })
                        .then(r => r.json())
                        .then(() => {
                            vol.arcSummary = vol.arcSummaryEdit;
                            vol.editingArc = false;
                        })
                        .catch(err => alert('保存失败: ' + err));
                },

                editChapterOutline(ch) {
                    ch.editing = true;
                    ch.titleEdit = ch.title;
                    ch.summaryEdit = ch.summary;
                    ch.characterNamesEdit = ch.characterNames;
                },

                saveChapterOutline(ch) {
                    const formData = new FormData();
                    formData.append('chapterNumber', ch.chapterNumber);
                    formData.append('title', ch.titleEdit);
                    formData.append('summary', ch.summaryEdit);
                    formData.append('characterNames', ch.characterNamesEdit);
                    fetch(`/projects/${this.projectId}/outline/edit-chapter`, { method: 'POST', body: formData })
                        .then(r => r.json())
                        .then(() => {
                            ch.title = ch.titleEdit;
                            ch.summary = ch.summaryEdit;
                            ch.characterNames = ch.characterNamesEdit;
                            ch.editing = false;
                        })
                        .catch(err => alert('保存失败: ' + err));
                },

                regenerateChapterOutline(ch) {
                    if (ch.regenerating) return;
                    ch.regenerating = true;
                    ch.status = 'GENERATING';
                    ch.summary = '';
                    ch.title = '';
                    ch.characterNames = '';

                    const url = `/projects/${this.projectId}/outline/regenerate-chapter?chapterNumber=${ch.chapterNumber}`;
                    const eventSource = new EventSource(url);
                    let content = '';

                    eventSource.addEventListener('token', (e) => {
                        content += e.data;
                        // Live parse title and characters
                        const titleMatch = content.match(/\*\*标题[：:]\*\*\s*(.+)/);
                        if (titleMatch) ch.title = titleMatch[1].trim();
                        const charMatch = content.match(/\*\*出场角色[：:]\*\*\s*(.+)/);
                        if (charMatch) ch.characterNames = charMatch[1].trim();
                        // Show summary (strip title and character lines)
                        ch.summary = content
                            .replace(/\*\*标题[：:]\*\*[^\n]*\n?/, '')
                            .replace(/\*\*出场角色[：:]\*\*[^\n]*\n?/, '')
                            .trim();
                    });

                    eventSource.addEventListener('done', () => {
                        eventSource.close();
                        ch.regenerating = false;
                        ch.status = 'COMPLETED';
                        // Reload from server to get properly parsed data
                        this.loadOutlineData();
                    });

                    eventSource.addEventListener('error', (e) => {
                        eventSource.close();
                        ch.regenerating = false;
                        ch.status = 'FAILED';
                        alert('重新生成失败: ' + (e.data || '未知错误'));
                    });

                    eventSource.onerror = () => {
                        eventSource.close();
                        ch.regenerating = false;
                        if (!content) {
                            ch.status = 'FAILED';
                        }
                    };
                },

                // === Full Auto Mode Methods ===

                startFullAuto() {
                    this.fullAutoError = '';
                    fetch(`/projects/${this.projectId}/auto-run/start`, { method: 'POST' })
                        .then(r => r.json())
                        .then(data => {
                            if (data.status === 'ok') {
                                this.fullAutoRunning = true;
                                this.fullAutoStatus = '正在启动...';
                                this.startAutoRunPolling();
                            } else {
                                this.fullAutoError = data.message || '启动失败';
                            }
                        })
                        .catch(err => { this.fullAutoError = '请求失败: ' + err.message; });
                },

                stopFullAuto() {
                    fetch(`/projects/${this.projectId}/auto-run/stop`, { method: 'POST' })
                        .then(r => r.json())
                        .then(() => { this.fullAutoStatus = '正在停止...'; });
                },

                toggleStepConfig(stepName, enabled) {
                    this.autoRunStepConfigs[stepName] = enabled;
                    fetch(`/projects/${this.projectId}/auto-run/step-config?step=${stepName}&enabled=${enabled}`, { method: 'PUT' })
                        .catch(() => { this.autoRunStepConfigs[stepName] = !enabled; });
                },

                startAutoRunPolling() {
                    if (this.autoRunPollTimer) return;
                    this.autoRunPollTimer = setInterval(() => this.pollAutoRunStatus(), 2000);
                },

                stopAutoRunPolling() {
                    if (this.autoRunPollTimer) {
                        clearInterval(this.autoRunPollTimer);
                        this.autoRunPollTimer = null;
                    }
                },

                pollAutoRunStatus() {
                    fetch(`/projects/${this.projectId}/auto-run/status`)
                        .then(r => r.json())
                        .then(data => {
                            this.fullAutoStatus = data.progress || '';

                            // Update active step indicator from auto-run step
                            if (data.step) {
                                const matched = this.stepList.find(s => s.label === data.step);
                                if (matched) {
                                    this.autoRunActiveStep = matched.name;
                                    this.autoRunActiveOrder = matched.order;
                                }
                            }

                            if (data.status === 'RUNNING' || data.status === 'STOPPING') {
                                this.fullAutoRunning = true;
                            } else {
                                this.fullAutoRunning = false;
                                this.stopAutoRunPolling();

                                if (data.status === 'COMPLETED') {
                                    this.fullAutoStatus = '全自动创作完成！即将刷新...';
                                    setTimeout(() => location.reload(), 2000);
                                } else if (data.status === 'FAILED') {
                                    this.fullAutoError = data.error || '未知错误';
                                } else {
                                    // IDLE - stopped by user
                                    this.fullAutoStatus = '';
                                    this.loadChapterList();
                                }
                            }
                        })
                        .catch(() => {});
                },

                // === Proofreading Methods ===

                loadProofreadData() {
                    fetch(`/projects/${this.projectId}/proofreading/data`)
                        .then(r => r.json())
                        .then(data => {
                            this.proofreadData = data;
                            this.proofreadLoaded = true;
                        })
                        .catch(err => console.error('Failed to load proofreading data:', err));
                },

                startProofreadSSE(url) {
                    if (this.currentEventSource) {
                        this.currentEventSource.close();
                    }
                    this.startElapsedTimer();
                    const eventSource = new EventSource(url);
                    this.currentEventSource = eventSource;

                    eventSource.addEventListener('proofread-section', (e) => {
                        const match = e.data.match(/\[\[PROOFREAD:CHAPTER:(\d+):(\w+)\]\]/);
                        if (match) {
                            this.proofreadStreaming = {
                                chapterNumber: parseInt(match[1]),
                                substep: match[2]
                            };
                            this.proofreadFixGenerating = false;
                        }
                    });

                    eventSource.addEventListener('proofread-fix-section', (e) => {
                        const match = e.data.match(/\[\[PROOFREAD_FIX:CHAPTER:(\d+)\]\]/);
                        if (match) {
                            const chNum = parseInt(match[1]);
                            this.proofreadStreaming = {
                                chapterNumber: chNum,
                                substep: 'FIX'
                            };
                            this.proofreadFixGenerating = true;
                            this.proofreadFixChapterNum = chNum;
                            this.proofreadFixContent = '';
                        }
                    });

                    eventSource.addEventListener('token', (e) => {
                        this.generatedContent += e.data;
                        if (this.proofreadFixGenerating) {
                            this.proofreadFixContent += e.data;
                        }
                    });

                    eventSource.addEventListener('done', () => {
                        this.generating = false;
                        this.proofreadStreaming = null;
                        this.proofreadFixGenerating = false;
                        this.currentEventSource = null;
                        this.stopElapsedTimer();
                        eventSource.close();
                        this.loadProofreadData();
                    });

                    eventSource.addEventListener('error', (e) => {
                        this.generating = false;
                        this.proofreadStreaming = null;
                        this.proofreadFixGenerating = false;
                        this.currentEventSource = null;
                        this.stopElapsedTimer();
                        if (e.data) alert('校对出错: ' + e.data);
                        eventSource.close();
                    });

                    eventSource.onerror = () => {
                        this.generating = false;
                        this.proofreadStreaming = null;
                        this.proofreadFixGenerating = false;
                        this.currentEventSource = null;
                        this.stopElapsedTimer();
                        eventSource.close();
                    };
                },

                getSubstepLabel(substep) {
                    const labels = {
                        'PLOT_SUMMARY': '情节提取',
                        'CHARACTER_CHECK': '角色校正',
                        'CONSISTENCY': '一致性检查',
                        'CONTINUITY': '衔接检查',
                        'FORESHADOWING': '伏笔追踪',
                        'FIX': '精修正文'
                    };
                    return labels[substep] || substep;
                },

                parseJson(str) {
                    if (!str) return [];
                    try {
                        // Strip markdown code block wrapper if present
                        let cleaned = str.trim();
                        if (cleaned.startsWith('```')) {
                            cleaned = cleaned.replace(/^```(?:json)?\s*/, '').replace(/\s*```$/, '');
                        }
                        const parsed = JSON.parse(cleaned);
                        return Array.isArray(parsed) ? parsed : [];
                    } catch (e) { return []; }
                },

                proofreadCompletedCount() {
                    return this.proofreadData.filter(d => d.proofreadStatus === 'GENERATED' || d.proofreadStatus === 'CONFIRMED').length;
                },

                proofreadFixChapter(num) {
                    this.proofreadFixGenerating = true;
                    this.proofreadFixChapterNum = num;
                    this.proofreadFixContent = '';
                    const { [num]: _, ...restFix } = this.proofreadFixPreviews;
                    this.proofreadFixPreviews = restFix;
                    // Update local status immediately
                    const item = this.proofreadData.find(d => d.chapterNumber === num);
                    if (item) item.proofreadFixStatus = 'GENERATING';
                    // Load current content as draft (before fix)
                    fetch(`/projects/${this.projectId}/chapters/${num}/content`)
                        .then(r => r.json())
                        .then(data => {
                            this.proofreadFixDraft = data.content || '';
                        });
                    // Start SSE for fix
                    const eventSource = new EventSource(`/projects/${this.projectId}/proofread-fix/${num}`);
                    eventSource.addEventListener('token', (e) => {
                        this.proofreadFixContent += e.data;
                    });
                    eventSource.addEventListener('done', () => {
                        this.proofreadFixGenerating = false;
                        eventSource.close();
                        this.loadProofreadData();
                        this.loadChapterList();
                    });
                    eventSource.addEventListener('error', (e) => {
                        this.proofreadFixGenerating = false;
                        eventSource.close();
                        if (e.data) alert('精修出错: ' + e.data);
                    });
                    eventSource.onerror = () => {
                        this.proofreadFixGenerating = false;
                        eventSource.close();
                    };
                },

                previewProofreadFix(num) {
                    if (this.proofreadFixPreviews[num]) {
                        const { [num]: _, ...rest } = this.proofreadFixPreviews;
                        this.proofreadFixPreviews = rest;
                        return;
                    }
                    fetch(`/projects/${this.projectId}/chapters/${num}/content`)
                        .then(r => r.json())
                        .then(data => {
                            this.proofreadFixPreviews = { ...this.proofreadFixPreviews, [num]: {
                                draft: data.contentBeforeFix || '',
                                content: data.content || ''
                            }};
                        });
                },

                openGlobalReplace() {
                    this.globalReplaceLog = [];
                    this.globalReplacing = false;
                    new bootstrap.Modal(document.getElementById('globalReplaceModal')).show();
                },

                executeGlobalReplace() {
                    const validPairs = this.replacePairs.filter(p => p.oldText.trim() !== '');
                    if (validPairs.length === 0) {
                        alert('请至少输入一对替换文本');
                        return;
                    }
                    this.globalReplacing = true;
                    this.globalReplaceLog = ['开始执行全局替换...'];

                    const params = new URLSearchParams();
                    validPairs.forEach(p => {
                        params.append('oldTexts', p.oldText);
                        params.append('newTexts', p.newText);
                    });

                    const es = new EventSource(`/projects/${this.projectId}/global-replace?${params.toString()}`);
                    es.addEventListener('progress', (e) => {
                        this.globalReplaceLog.push(e.data);
                    });
                    es.addEventListener('done', (e) => {
                        this.globalReplaceLog.push(e.data);
                        this.globalReplacing = false;
                        es.close();
                        // Reload data
                        this.loadChapterList();
                        this.loadCharacterList();
                        if (this.currentStep === 'PROOFREADING') this.loadProofreadData();
                    });
                    es.addEventListener('error', (e) => {
                        if (e.data) this.globalReplaceLog.push('错误: ' + e.data);
                        this.globalReplacing = false;
                        es.close();
                    });
                    es.onerror = () => {
                        if (this.globalReplacing) {
                            this.globalReplaceLog.push('连接断开');
                            this.globalReplacing = false;
                        }
                        es.close();
                    };
                },

                loadChapterListAsync() {
                    return fetch(`/projects/${this.projectId}/chapters/list`)
                        .then(r => r.json())
                        .then(data => { this.chapterListData = data; });
                }
            }
        }
    </script>
