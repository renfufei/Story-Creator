<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('查看模板', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-0" th:text="'查看模板: ' + ${template.name()}">查看模板</h2>
            <small class="text-muted" th:text="${template.description()}">描述</small>
        </div>
        <a th:href="@{/settings/tts-templates}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 返回列表
        </a>
    </div>

    <!-- Template Info -->
    <div class="card mb-4">
        <div class="card-header"><strong>模板信息</strong></div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-3">
                    <label class="form-label small mb-1">名称</label>
                    <input type="text" class="form-control form-control-sm" th:value="${template.name()}" readonly>
                </div>
                <div class="col-md-5">
                    <label class="form-label small mb-1">描述</label>
                    <input type="text" class="form-control form-control-sm" th:value="${template.description()}" readonly>
                </div>
            </div>
        </div>
    </div>

    <!-- Rules List -->
    <div class="card">
        <div class="card-header">
            <strong><i class="bi bi-list-ol"></i> 替换规则</strong>
        </div>
        <div class="card-body">
            <div th:if="${!template.rules().isEmpty()}">
                <table class="table table-sm table-hover mb-0">
                    <thead>
                        <tr>
                            <th style="width: 50px;">序号</th>
                            <th>匹配模式</th>
                            <th>替换为</th>
                            <th style="width: 60px;">类型</th>
                            <th>描述</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rule, iter : ${template.rules()}">
                            <td th:text="${iter.index}">0</td>
                            <td><code class="small" th:text="${rule.pattern()}" style="word-break: break-all;">pattern</code></td>
                            <td>
                                <code th:if="${rule.replacement() != null && !rule.replacement().isEmpty()}" th:text="${rule.replacement()}">rep</code>
                                <span th:if="${rule.replacement() == null || rule.replacement().isEmpty()}" class="text-muted small">(删除)</span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${rule.isRegex()} ? 'bg-info' : 'bg-secondary'"
                                      th:text="${rule.isRegex()} ? '正则' : '文本'">类型</span>
                            </td>
                            <td class="text-muted small" th:text="${rule.description()}">描述</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${template.rules().isEmpty()}" class="text-muted small mb-0">此模板暂无规则。</p>
        </div>
    </div>
</div>
</body>
</html>
