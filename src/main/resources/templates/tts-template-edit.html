<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('编辑模板', ~{::content})}">
<body>
<div th:fragment="content" x-data="{ showAdd: false, editingRule: null }">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-0" th:text="'编辑模板: ' + ${template.name}">编辑模板</h2>
            <small class="text-muted" th:text="${template.description}">描述</small>
        </div>
        <a th:href="@{/settings/tts-templates}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 返回列表
        </a>
    </div>

    <!-- Template Info -->
    <div class="card mb-4">
        <div class="card-header"><strong>模板信息</strong></div>
        <div class="card-body">
            <form th:action="@{/settings/tts-templates/{id}/update(id=${template.id})}" method="post" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small mb-1">名称</label>
                    <input type="text" class="form-control form-control-sm" name="name" th:value="${template.name}" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label small mb-1">描述</label>
                    <input type="text" class="form-control form-control-sm" name="description" th:value="${template.description}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Rules List -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong><i class="bi bi-list-ol"></i> 替换规则</strong>
            <button class="btn btn-sm btn-outline-primary" @click="showAdd = true">
                <i class="bi bi-plus"></i> 添加规则
            </button>
        </div>
        <div class="card-body">
            <!-- Add Rule Form -->
            <div class="border rounded p-3 mb-3 bg-light" x-show="showAdd" x-cloak>
                <form th:action="@{/settings/tts-templates/{id}/rules(id=${template.id})}" method="post">
                    <div class="row g-2 mb-2">
                        <div class="col-md-4">
                            <label class="form-label small mb-1">匹配模式</label>
                            <input type="text" class="form-control form-control-sm" name="pattern" required placeholder="要匹配的文字或正则">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small mb-1">替换为</label>
                            <input type="text" class="form-control form-control-sm" name="replacement" placeholder="留空则删除">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small mb-1">描述</label>
                            <input type="text" class="form-control form-control-sm" name="description" placeholder="可选">
                        </div>
                        <div class="col-md-1">
                            <label class="form-label small mb-1">排序</label>
                            <input type="number" class="form-control form-control-sm" name="sortOrder" value="0">
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" name="isRegex" value="true" id="newIsRegex">
                            <label class="form-check-label small" for="newIsRegex">正则表达式</label>
                        </div>
                        <button type="submit" class="btn btn-sm btn-primary">添加</button>
                        <button type="button" class="btn btn-sm btn-secondary" @click="showAdd = false">取消</button>
                    </div>
                </form>
            </div>

            <!-- Rules Table -->
            <div th:if="${!rules.isEmpty()}">
                <table class="table table-sm table-hover mb-0">
                    <thead>
                        <tr>
                            <th style="width: 50px;">序号</th>
                            <th>匹配模式</th>
                            <th>替换为</th>
                            <th style="width: 60px;">类型</th>
                            <th>描述</th>
                            <th style="width: 80px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rule : ${rules}">
                            <td th:text="${rule.sortOrder}">0</td>
                            <td><code class="small" th:text="${rule.pattern}" style="word-break: break-all;">pattern</code></td>
                            <td>
                                <code th:if="${rule.replacement != null && !rule.replacement.isEmpty()}" th:text="${rule.replacement}">rep</code>
                                <span th:if="${rule.replacement == null || rule.replacement.isEmpty()}" class="text-muted small">(删除)</span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${rule.regex} ? 'bg-info' : 'bg-secondary'"
                                      th:text="${rule.regex} ? '正则' : '文本'">类型</span>
                            </td>
                            <td class="text-muted small" th:text="${rule.description}">描述</td>
                            <td>
                                <form th:action="@{/settings/tts-templates/{tid}/rules/{rid}/delete(tid=${template.id},rid=${rule.id})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('确定删除此规则？')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="删除">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${rules.isEmpty()}" class="text-muted small mb-0">暂无规则，点击"添加规则"开始配置</p>
        </div>
    </div>
</div>
</body>
</html>
