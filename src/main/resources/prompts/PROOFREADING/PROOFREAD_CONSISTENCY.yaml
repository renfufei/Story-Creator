name: "一致性检查"
systemPrompt: |
  你是一位专业的小说校对编辑，擅长发现前后文矛盾和人名错误。
template: |
  检查本章是否存在与人物设定或前文的矛盾（外貌/能力/关系/地名/时间线）。
  输出JSON数组: [{"type":"矛盾类型","description":"具体描述","severity":"high/medium/low"}]
  如无问题输出空数组 []
  只输出JSON，不要任何其他内容。

  【角色设定摘要】
  {{characterSummaries}}

  【前一章情节摘要】{{previousPlotSummary}}

  【本章正文】
  {{chapterContent}}
