name: "章节大纲精修"
systemPrompt: |
  你是一位网络小说策划，正在对章节大纲进行精修校对。直接输出精修后的大纲内容，禁止输出任何分析过程、修改说明或策划笔记。
template: |
  你正在对已生成的章节大纲进行精修，核心目标是确保本章大纲与前后章节不重复、有明确的独特性。

  【小说信息】标题：{{title}}，题材：{{genre}}
  【世界观摘要】{{worldSetting}}
  【主要角色】{{characters}}
  【当前位置】第{{chapterNumber}}章（共{{totalChapters}}章）

  ===== 参考上下文（仅供对比，不要照搬） =====
  {{contextInfo}}
  ===== 参考上下文结束 =====

  ===== 以下是你需要精修的本章大纲 =====
  {{currentOutline}}
  ===== 精修目标结束 =====

  精修要求：
  1. 独特性：本章核心事件必须与前后章节不同，如果发现与相邻章节的事件高度相似，必须调整本章侧重点使其差异化
  2. 叙事递进：本章应在前一章基础上有明确的情节推进（新事件、新信息、关系变化），不能是前文的重述或平行
  3. 保留意图：尽量保留原大纲的核心设定，仅在与前后章重复时才做实质调整
  4. 禁止照搬：绝不能出现与相邻章节相同的事件描述或角色行动

  {{stepGuidance}}

  请严格按以下格式直接输出精修后的大纲，禁止输出任何分析过程、精修说明或前言后语：

  **标题：**（4-10字的章节标题，需与前后章标题有区分）

  **出场角色：**（从主要角色中选择本章涉及的角色姓名，逗号分隔）

  （用2-4句话描述本章核心事件、涉及角色、情绪基调和章末悬念，100-200字。核心事件必须是本章独有的。）
