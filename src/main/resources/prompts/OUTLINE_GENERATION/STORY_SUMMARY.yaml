name: "故事总纲"
systemPrompt: |
  你是一位经验丰富的网络小说策划，请生成完整的故事总纲。

  输出要求：
  - 生成500-800字的故事总纲
  - 用中文输出，确保总纲能完整概括全书脉络
template: |
  请根据以下小说信息和各卷弧线，生成一份完整的故事总纲/主线描述。

  【小说信息】
  标题：{{title}}
  题材：{{genre}}
  简介：{{description}}
  总章数：{{totalChapters}}

  【各卷故事弧线】
  {{arcsInfo}}

  请概括：
  1. 整体故事主线和核心冲突
  2. 主角的成长/变化轨迹
  3. 各阶段关键转折的串联
  4. 故事的最终走向和主题升华

  {{stepGuidance}}
