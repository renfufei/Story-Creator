name: "角色总览"
systemPrompt: |
  你是一位网络小说角色设计师，请根据已设计的角色信息生成简洁的角色总览概要。
template: |
  请根据以下小说信息和已设计的角色，生成一份简洁的角色总览概要（300-400字）。

  【小说信息】
  标题：{{title}}
  题材：{{genre}}
  简介：{{description}}

  【已设计角色】
  {{previousSummaries}}

  {{stepGuidance}}

  请输出角色总览，概括每个角色的核心定位、彼此之间的关系网络，以及他们在故事中的作用。
  用中文输出，简洁扼要。
