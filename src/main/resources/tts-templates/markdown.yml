id: markdown
name: "Markdown格式清理"
description: "移除Markdown格式标记和分隔线"
rules:
  - pattern: "(?m)^#{1,6}\\s+|\\*\\*|\\*|~~|`{1,3}|\\[([^\\]]+)\\]\\([^)]+\\)"
    replacement: "$1"
    isRegex: true
    description: "移除Markdown标题、加粗、斜体、删除线、代码和链接格式"
  - pattern: "(?m)^\\s*[-*=─━—]{3,}\\s*$"
    replacement: ""
    isRegex: true
    description: "移除分隔线（---、***、===等）"
