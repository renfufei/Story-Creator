spring:
  application:
    name: story-creator
  datasource:
    url: jdbc:h2:file:./data/story-creator
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  thymeleaf:
    cache: false

server:
  port: 8080

story-creator:
  ai:
    default-provider: claude
    claude:
      api-key: ${CLAUDE_API_KEY:}
      base-url: https://api.anthropic.com
      default-model: claude-sonnet-4-5-20250514
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com
      default-model: gpt-4o
    ollama:
      base-url: http://localhost:11434
      default-model: llama3
  workflow:
    step-token-limits:
      WORLD_BUILDING: 4096
      CHARACTER_DESIGN: 4096
      OUTLINE_GENERATION: 8192
      CHAPTER_WRITING: 6144
      POLISHING: 6144
