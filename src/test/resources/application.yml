spring:
  datasource:
    url: jdbc:h2:mem:story_creator_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false

server:
  port: 0

story-creator:
  ai:
    default-provider: claude
    claude:
      api-key: test-key
      base-url: https://api.anthropic.com
      default-model: claude-sonnet-4-5-20250514
    openai:
      api-key: test-key
      base-url: https://api.openai.com
      default-model: gpt-4o
    ollama:
      base-url: http://localhost:11434
      default-model: llama3
  workflow:
    step-token-limits:
      WORLD_BUILDING: 4096
      CHARACTER_DESIGN: 4096
      OUTLINE_GENERATION: 8192
      CHAPTER_WRITING: 6144
      POLISHING: 6144
